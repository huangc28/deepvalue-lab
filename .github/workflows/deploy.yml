name: Deploy

on:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

env:
  IMAGE_TAG: latest

jobs:
  detect_changes:
    name: Detect Changed Services
    runs-on: ubuntu-latest
    outputs:
      deploy_web: ${{ steps.detect.outputs.deploy_web }}
      deploy_be: ${{ steps.detect.outputs.deploy_be }}
      deploy_worker: ${{ steps.detect.outputs.deploy_worker }}
      changed_files: ${{ steps.detect.outputs.changed_files }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed paths
        id: detect
        run: |
          set -eu

          BEFORE_SHA="${{ github.event.before }}"
          CURRENT_SHA="${{ github.sha }}"

          if [ -z "${BEFORE_SHA}" ] || [ "${BEFORE_SHA}" = "0000000000000000000000000000000000000000" ]; then
            CHANGED_FILES="$(git ls-tree -r --name-only "${CURRENT_SHA}")"
          else
            CHANGED_FILES="$(git diff --name-only "${BEFORE_SHA}" "${CURRENT_SHA}")"
          fi

          printf '%s\n' "${CHANGED_FILES}" > /tmp/changed-files.txt

          deploy_all=false
          deploy_web=false
          deploy_be=false
          deploy_worker=false

          if grep -Eq '^(\.github/workflows/|web/azure/|be/azure/)' /tmp/changed-files.txt; then
            deploy_all=true
          fi

          if [ "${deploy_all}" = true ] || grep -Eq '^web/' /tmp/changed-files.txt; then
            deploy_web=true
          fi

          if [ "${deploy_all}" = true ] || grep -Eq '^be/' /tmp/changed-files.txt; then
            deploy_be=true
            deploy_worker=true
          fi

          {
            echo "deploy_web=${deploy_web}"
            echo "deploy_be=${deploy_be}"
            echo "deploy_worker=${deploy_worker}"
            echo "changed_files<<EOF"
            cat /tmp/changed-files.txt
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: Summarize detected changes
        run: |
          {
            echo "### Change detection"
            echo "- deploy_web: \`${{ steps.detect.outputs.deploy_web }}\`"
            echo "- deploy_be: \`${{ steps.detect.outputs.deploy_be }}\`"
            echo "- deploy_worker: \`${{ steps.detect.outputs.deploy_worker }}\`"
            echo ""
            echo "Changed files:"
            echo '```text'
            printf '%s\n' "${{ steps.detect.outputs.changed_files }}"
            echo '```'
          } >> "${GITHUB_STEP_SUMMARY}"

  foundation:
    name: Phase 1 Foundation
    runs-on: ubuntu-latest
    env:
      AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
      AZURE_CONTAINERAPPS_ENV: ${{ vars.AZURE_CONTAINERAPPS_ENV }}
      AZURE_LOCATION: ${{ vars.AZURE_LOCATION }}
      AZURE_ACR_NAME: ${{ vars.AZURE_ACR_NAME }}
      VITE_API_URL: ${{ vars.VITE_API_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required GitHub configuration
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        run: |
          set -eu

          missing=0
          for key in \
            AZURE_CLIENT_ID \
            AZURE_TENANT_ID \
            AZURE_SUBSCRIPTION_ID \
            AZURE_RESOURCE_GROUP \
            AZURE_CONTAINERAPPS_ENV \
            AZURE_LOCATION \
            AZURE_ACR_NAME \
            VITE_API_URL
          do
            if [ -z "${!key:-}" ]; then
              echo "::error title=Missing config::$key is not configured"
              missing=1
            fi
          done

          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Azure login via OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Install Azure Container Apps extension
        run: |
          az extension add --name containerapp --upgrade

      - name: Resolve target Azure resources
        run: |
          set -eu

          echo "Resolving Azure foundation resources..."
          echo "Resource group: ${AZURE_RESOURCE_GROUP}"
          echo "Container Apps environment: ${AZURE_CONTAINERAPPS_ENV}"
          echo "Azure location: ${AZURE_LOCATION}"
          echo "ACR name: ${AZURE_ACR_NAME}"
          echo "VITE_API_URL: ${VITE_API_URL}"

          az account show --output table

          actual_rg_location="$(
            az group show \
              --name "${AZURE_RESOURCE_GROUP}" \
              --query location \
              --output tsv
          )"

          if [ "${actual_rg_location}" != "${AZURE_LOCATION}" ]; then
            echo "::error title=Azure location mismatch::AZURE_LOCATION=${AZURE_LOCATION} but resource group is in ${actual_rg_location}"
            exit 1
          fi

          az group show --name "${AZURE_RESOURCE_GROUP}" --output table
          az containerapp env show \
            --name "${AZURE_CONTAINERAPPS_ENV}" \
            --resource-group "${AZURE_RESOURCE_GROUP}" \
            --output table
          az acr show --name "${AZURE_ACR_NAME}" --output table

  build_web:
    name: Phase 2 Build Web
    needs:
      - detect_changes
      - foundation
    if: needs.detect_changes.outputs.deploy_web == 'true'
    runs-on: ubuntu-latest
    env:
      AZURE_ACR_NAME: ${{ vars.AZURE_ACR_NAME }}
      VITE_API_URL: ${{ vars.VITE_API_URL }}
      WEB_IMAGE_REPOSITORY: ${{ vars.AZURE_ACR_NAME }}.azurecr.io/web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login via OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to ACR
        run: |
          set -eu
          az acr login --name "${AZURE_ACR_NAME}"

      - name: Build web image
        run: |
          set -eu
          WEB_IMAGE="${WEB_IMAGE_REPOSITORY}:${IMAGE_TAG}"
          docker build \
            --no-cache \
            --platform linux/amd64 \
            --build-arg VITE_API_URL="${VITE_API_URL}" \
            --tag "${WEB_IMAGE}" \
            ./web

      - name: Push web image
        run: |
          set -eu
          WEB_IMAGE="${WEB_IMAGE_REPOSITORY}:${IMAGE_TAG}"
          docker push "${WEB_IMAGE}"

      - name: Verify web image in ACR
        run: |
          set -eu
          az acr repository show-tags \
            --name "${AZURE_ACR_NAME}" \
            --repository web \
            --query "[?@=='${IMAGE_TAG}']" \
            --output tsv | grep -x "${IMAGE_TAG}"

      - name: Summarize web build
        run: |
          WEB_IMAGE="${WEB_IMAGE_REPOSITORY}:${IMAGE_TAG}"
          {
            echo "### Web image"
            echo "- pushed \`${WEB_IMAGE}\`"
            echo "- build arg \`VITE_API_URL\` applied"
          } >> "${GITHUB_STEP_SUMMARY}"

  build_be:
    name: Phase 2 Build Backend
    needs:
      - detect_changes
      - foundation
    if: needs.detect_changes.outputs.deploy_be == 'true'
    runs-on: ubuntu-latest
    env:
      AZURE_ACR_NAME: ${{ vars.AZURE_ACR_NAME }}
      BE_IMAGE_REPOSITORY: ${{ vars.AZURE_ACR_NAME }}.azurecr.io/be
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login via OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to ACR
        run: |
          set -eu
          az acr login --name "${AZURE_ACR_NAME}"

      - name: Build backend image
        run: |
          set -eu
          BE_IMAGE="${BE_IMAGE_REPOSITORY}:${IMAGE_TAG}"
          docker build \
            --no-cache \
            --platform linux/amd64 \
            --tag "${BE_IMAGE}" \
            ./be

      - name: Push backend image
        run: |
          set -eu
          BE_IMAGE="${BE_IMAGE_REPOSITORY}:${IMAGE_TAG}"
          docker push "${BE_IMAGE}"

      - name: Verify backend image in ACR
        run: |
          set -eu
          az acr repository show-tags \
            --name "${AZURE_ACR_NAME}" \
            --repository be \
            --query "[?@=='${IMAGE_TAG}']" \
            --output tsv | grep -x "${IMAGE_TAG}"

      - name: Summarize backend build
        run: |
          BE_IMAGE="${BE_IMAGE_REPOSITORY}:${IMAGE_TAG}"
          {
            echo "### Backend image"
            echo "- pushed \`${BE_IMAGE}\`"
          } >> "${GITHUB_STEP_SUMMARY}"

  build_worker:
    name: Phase 2 Build Worker
    needs:
      - detect_changes
      - foundation
    if: needs.detect_changes.outputs.deploy_worker == 'true'
    runs-on: ubuntu-latest
    env:
      AZURE_ACR_NAME: ${{ vars.AZURE_ACR_NAME }}
      WORKER_IMAGE_REPOSITORY: ${{ vars.AZURE_ACR_NAME }}.azurecr.io/worker
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login via OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to ACR
        run: |
          set -eu
          az acr login --name "${AZURE_ACR_NAME}"

      - name: Build worker image
        run: |
          set -eu
          WORKER_IMAGE="${WORKER_IMAGE_REPOSITORY}:${IMAGE_TAG}"
          docker build \
            --no-cache \
            --platform linux/amd64 \
            --file ./be/Dockerfile.worker \
            --tag "${WORKER_IMAGE}" \
            ./be

      - name: Push worker image
        run: |
          set -eu
          WORKER_IMAGE="${WORKER_IMAGE_REPOSITORY}:${IMAGE_TAG}"
          docker push "${WORKER_IMAGE}"

      - name: Verify worker image in ACR
        run: |
          set -eu
          az acr repository show-tags \
            --name "${AZURE_ACR_NAME}" \
            --repository worker \
            --query "[?@=='${IMAGE_TAG}']" \
            --output tsv | grep -x "${IMAGE_TAG}"

      - name: Summarize worker build
        run: |
          WORKER_IMAGE="${WORKER_IMAGE_REPOSITORY}:${IMAGE_TAG}"
          {
            echo "### Worker image"
            echo "- pushed \`${WORKER_IMAGE}\`"
          } >> "${GITHUB_STEP_SUMMARY}"

  deploy_web:
    name: Phase 3 Deploy Web
    needs:
      - detect_changes
      - build_web
    if: needs.detect_changes.outputs.deploy_web == 'true'
    runs-on: ubuntu-latest
    env:
      AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
      AZURE_CONTAINER_APP_WEB: ${{ vars.AZURE_CONTAINER_APP_WEB }}
      WEB_IMAGE_REPOSITORY: ${{ vars.AZURE_ACR_NAME }}.azurecr.io/web
    steps:
      - name: Azure login via OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Install Azure Container Apps extension
        run: |
          az extension add --name containerapp --upgrade

      - name: Update web Container App
        run: |
          set -eu
          SHORT_SHA="${GITHUB_SHA::7}"
          REVISION_SUFFIX="w${GITHUB_RUN_NUMBER}-${GITHUB_RUN_ATTEMPT}-${SHORT_SHA}"
          WEB_IMAGE="${WEB_IMAGE_REPOSITORY}:${IMAGE_TAG}"

          echo "REVISION_SUFFIX=${REVISION_SUFFIX}" >> "${GITHUB_ENV}"

          az containerapp update \
            --name "${AZURE_CONTAINER_APP_WEB}" \
            --resource-group "${AZURE_RESOURCE_GROUP}" \
            --image "${WEB_IMAGE}" \
            --revision-suffix "${REVISION_SUFFIX}" \
            --set-env-vars "GIT_SHA=${GITHUB_SHA}"

      - name: Verify web revision and traceability
        run: |
          set -eu
          for _ in $(seq 1 12); do
            REVISION_NAME="$(
              az containerapp revision list \
                --name "${AZURE_CONTAINER_APP_WEB}" \
                --resource-group "${AZURE_RESOURCE_GROUP}" \
                --query "[?contains(name, '${REVISION_SUFFIX}')].name | [0]" \
                --output tsv
            )"

            ACTUAL_GIT_SHA="$(
              az containerapp show \
                --name "${AZURE_CONTAINER_APP_WEB}" \
                --resource-group "${AZURE_RESOURCE_GROUP}" \
                --query "properties.template.containers[0].env[?name=='GIT_SHA'].value | [0]" \
                --output tsv
            )"

            if [ -n "${REVISION_NAME}" ] && [ "${ACTUAL_GIT_SHA}" = "${GITHUB_SHA}" ]; then
              exit 0
            fi

            sleep 5
          done

          echo "::error title=Web deploy verification failed::Revision suffix or GIT_SHA traceability was not observable after update"
          exit 1

      - name: Summarize web deploy
        run: |
          {
            echo "### Web deploy"
            echo "- app: \`${AZURE_CONTAINER_APP_WEB}\`"
            echo "- revision suffix: \`${REVISION_SUFFIX}\`"
            echo "- git sha: \`${GITHUB_SHA}\`"
          } >> "${GITHUB_STEP_SUMMARY}"

  deploy_be:
    name: Phase 3 Deploy Backend
    needs:
      - detect_changes
      - build_be
    if: needs.detect_changes.outputs.deploy_be == 'true'
    runs-on: ubuntu-latest
    env:
      AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
      AZURE_CONTAINER_APP_BE: ${{ vars.AZURE_CONTAINER_APP_BE }}
      BE_IMAGE_REPOSITORY: ${{ vars.AZURE_ACR_NAME }}.azurecr.io/be
    steps:
      - name: Azure login via OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Install Azure Container Apps extension
        run: |
          az extension add --name containerapp --upgrade

      - name: Update backend Container App
        run: |
          set -eu
          SHORT_SHA="${GITHUB_SHA::7}"
          REVISION_SUFFIX="b${GITHUB_RUN_NUMBER}-${GITHUB_RUN_ATTEMPT}-${SHORT_SHA}"
          BE_IMAGE="${BE_IMAGE_REPOSITORY}:${IMAGE_TAG}"

          echo "REVISION_SUFFIX=${REVISION_SUFFIX}" >> "${GITHUB_ENV}"

          az containerapp update \
            --name "${AZURE_CONTAINER_APP_BE}" \
            --resource-group "${AZURE_RESOURCE_GROUP}" \
            --image "${BE_IMAGE}" \
            --revision-suffix "${REVISION_SUFFIX}" \
            --set-env-vars "GIT_SHA=${GITHUB_SHA}"

      - name: Verify backend revision and traceability
        run: |
          set -eu
          for _ in $(seq 1 12); do
            REVISION_NAME="$(
              az containerapp revision list \
                --name "${AZURE_CONTAINER_APP_BE}" \
                --resource-group "${AZURE_RESOURCE_GROUP}" \
                --query "[?contains(name, '${REVISION_SUFFIX}')].name | [0]" \
                --output tsv
            )"

            ACTUAL_GIT_SHA="$(
              az containerapp show \
                --name "${AZURE_CONTAINER_APP_BE}" \
                --resource-group "${AZURE_RESOURCE_GROUP}" \
                --query "properties.template.containers[0].env[?name=='GIT_SHA'].value | [0]" \
                --output tsv
            )"

            if [ -n "${REVISION_NAME}" ] && [ "${ACTUAL_GIT_SHA}" = "${GITHUB_SHA}" ]; then
              exit 0
            fi

            sleep 5
          done

          echo "::error title=Backend deploy verification failed::Revision suffix or GIT_SHA traceability was not observable after update"
          exit 1

      - name: Summarize backend deploy
        run: |
          {
            echo "### Backend deploy"
            echo "- app: \`${AZURE_CONTAINER_APP_BE}\`"
            echo "- revision suffix: \`${REVISION_SUFFIX}\`"
            echo "- git sha: \`${GITHUB_SHA}\`"
          } >> "${GITHUB_STEP_SUMMARY}"

  deploy_worker:
    name: Phase 3 Deploy Worker
    needs:
      - detect_changes
      - build_worker
    if: needs.detect_changes.outputs.deploy_worker == 'true'
    runs-on: ubuntu-latest
    env:
      AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
      AZURE_CONTAINER_APP_WORKER: ${{ vars.AZURE_CONTAINER_APP_WORKER }}
      WORKER_IMAGE_REPOSITORY: ${{ vars.AZURE_ACR_NAME }}.azurecr.io/worker
    steps:
      - name: Azure login via OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Install Azure Container Apps extension
        run: |
          az extension add --name containerapp --upgrade

      - name: Update worker Container App
        run: |
          set -eu
          SHORT_SHA="${GITHUB_SHA::7}"
          REVISION_SUFFIX="k${GITHUB_RUN_NUMBER}-${GITHUB_RUN_ATTEMPT}-${SHORT_SHA}"
          WORKER_IMAGE="${WORKER_IMAGE_REPOSITORY}:${IMAGE_TAG}"

          echo "REVISION_SUFFIX=${REVISION_SUFFIX}" >> "${GITHUB_ENV}"

          az containerapp update \
            --name "${AZURE_CONTAINER_APP_WORKER}" \
            --resource-group "${AZURE_RESOURCE_GROUP}" \
            --image "${WORKER_IMAGE}" \
            --revision-suffix "${REVISION_SUFFIX}" \
            --set-env-vars "GIT_SHA=${GITHUB_SHA}"

      - name: Verify worker revision and traceability
        run: |
          set -eu
          for _ in $(seq 1 12); do
            REVISION_NAME="$(
              az containerapp revision list \
                --name "${AZURE_CONTAINER_APP_WORKER}" \
                --resource-group "${AZURE_RESOURCE_GROUP}" \
                --query "[?contains(name, '${REVISION_SUFFIX}')].name | [0]" \
                --output tsv
            )"

            ACTUAL_GIT_SHA="$(
              az containerapp show \
                --name "${AZURE_CONTAINER_APP_WORKER}" \
                --resource-group "${AZURE_RESOURCE_GROUP}" \
                --query "properties.template.containers[0].env[?name=='GIT_SHA'].value | [0]" \
                --output tsv
            )"

            if [ -n "${REVISION_NAME}" ] && [ "${ACTUAL_GIT_SHA}" = "${GITHUB_SHA}" ]; then
              exit 0
            fi

            sleep 5
          done

          echo "::error title=Worker deploy verification failed::Revision suffix or GIT_SHA traceability was not observable after update"
          exit 1

      - name: Summarize worker deploy
        run: |
          {
            echo "### Worker deploy"
            echo "- app: \`${AZURE_CONTAINER_APP_WORKER}\`"
            echo "- revision suffix: \`${REVISION_SUFFIX}\`"
            echo "- git sha: \`${GITHUB_SHA}\`"
          } >> "${GITHUB_STEP_SUMMARY}"
