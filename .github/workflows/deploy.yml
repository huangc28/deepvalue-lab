name: Deploy

on:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write

env:
  IMAGE_TAG: latest

jobs:
  foundation:
    name: Phase 1 Foundation
    runs-on: ubuntu-latest
    env:
      AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
      AZURE_CONTAINERAPPS_ENV: ${{ vars.AZURE_CONTAINERAPPS_ENV }}
      AZURE_LOCATION: ${{ vars.AZURE_LOCATION }}
      AZURE_ACR_NAME: ${{ vars.AZURE_ACR_NAME }}
      VITE_API_URL: ${{ vars.VITE_API_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required GitHub configuration
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        run: |
          set -eu

          missing=0
          for key in \
            AZURE_CLIENT_ID \
            AZURE_TENANT_ID \
            AZURE_SUBSCRIPTION_ID \
            AZURE_RESOURCE_GROUP \
            AZURE_CONTAINERAPPS_ENV \
            AZURE_LOCATION \
            AZURE_ACR_NAME \
            VITE_API_URL
          do
            if [ -z "${!key:-}" ]; then
              echo "::error title=Missing config::$key is not configured"
              missing=1
            fi
          done

          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Azure login via OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Install Azure Container Apps extension
        run: |
          az extension add --name containerapp --upgrade

      - name: Resolve target Azure resources
        run: |
          set -eu

          echo "Resolving Azure foundation resources..."
          echo "Resource group: ${AZURE_RESOURCE_GROUP}"
          echo "Container Apps environment: ${AZURE_CONTAINERAPPS_ENV}"
          echo "Azure location: ${AZURE_LOCATION}"
          echo "ACR name: ${AZURE_ACR_NAME}"
          echo "VITE_API_URL: ${VITE_API_URL}"

          az account show --output table

          actual_rg_location="$(
            az group show \
              --name "${AZURE_RESOURCE_GROUP}" \
              --query location \
              --output tsv
          )"

          if [ "${actual_rg_location}" != "${AZURE_LOCATION}" ]; then
            echo "::error title=Azure location mismatch::AZURE_LOCATION=${AZURE_LOCATION} but resource group is in ${actual_rg_location}"
            exit 1
          fi

          az group show --name "${AZURE_RESOURCE_GROUP}" --output table
          az containerapp env show \
            --name "${AZURE_CONTAINERAPPS_ENV}" \
            --resource-group "${AZURE_RESOURCE_GROUP}" \
            --output table
          az acr show --name "${AZURE_ACR_NAME}" --output table

  build_web:
    name: Phase 2 Build Web
    needs: foundation
    runs-on: ubuntu-latest
    env:
      AZURE_ACR_NAME: ${{ vars.AZURE_ACR_NAME }}
      VITE_API_URL: ${{ vars.VITE_API_URL }}
      WEB_IMAGE: ${{ vars.AZURE_ACR_NAME }}.azurecr.io/web:latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login via OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to ACR
        run: |
          set -eu
          az acr login --name "${AZURE_ACR_NAME}"

      - name: Build web image
        run: |
          set -eu
          docker build \
            --no-cache \
            --platform linux/amd64 \
            --build-arg VITE_API_URL="${VITE_API_URL}" \
            --tag "${WEB_IMAGE}" \
            ./web

      - name: Push web image
        run: |
          set -eu
          docker push "${WEB_IMAGE}"

      - name: Verify web image in ACR
        run: |
          set -eu
          az acr repository show-tags \
            --name "${AZURE_ACR_NAME}" \
            --repository web \
            --query "[?@=='${IMAGE_TAG}']" \
            --output tsv | grep -x "${IMAGE_TAG}"

      - name: Summarize web build
        run: |
          {
            echo "### Web image"
            echo "- pushed \`${WEB_IMAGE}\`"
            echo "- build arg \`VITE_API_URL\` applied"
          } >> "${GITHUB_STEP_SUMMARY}"

  build_be:
    name: Phase 2 Build Backend
    needs: foundation
    runs-on: ubuntu-latest
    env:
      AZURE_ACR_NAME: ${{ vars.AZURE_ACR_NAME }}
      BE_IMAGE: ${{ vars.AZURE_ACR_NAME }}.azurecr.io/be:latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login via OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to ACR
        run: |
          set -eu
          az acr login --name "${AZURE_ACR_NAME}"

      - name: Build backend image
        run: |
          set -eu
          docker build \
            --no-cache \
            --platform linux/amd64 \
            --tag "${BE_IMAGE}" \
            ./be

      - name: Push backend image
        run: |
          set -eu
          docker push "${BE_IMAGE}"

      - name: Verify backend image in ACR
        run: |
          set -eu
          az acr repository show-tags \
            --name "${AZURE_ACR_NAME}" \
            --repository be \
            --query "[?@=='${IMAGE_TAG}']" \
            --output tsv | grep -x "${IMAGE_TAG}"

      - name: Summarize backend build
        run: |
          {
            echo "### Backend image"
            echo "- pushed \`${BE_IMAGE}\`"
          } >> "${GITHUB_STEP_SUMMARY}"

  build_worker:
    name: Phase 2 Build Worker
    needs: foundation
    runs-on: ubuntu-latest
    env:
      AZURE_ACR_NAME: ${{ vars.AZURE_ACR_NAME }}
      WORKER_IMAGE: ${{ vars.AZURE_ACR_NAME }}.azurecr.io/worker:latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login via OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to ACR
        run: |
          set -eu
          az acr login --name "${AZURE_ACR_NAME}"

      - name: Build worker image
        run: |
          set -eu
          docker build \
            --no-cache \
            --platform linux/amd64 \
            --file ./be/Dockerfile.worker \
            --tag "${WORKER_IMAGE}" \
            ./be

      - name: Push worker image
        run: |
          set -eu
          docker push "${WORKER_IMAGE}"

      - name: Verify worker image in ACR
        run: |
          set -eu
          az acr repository show-tags \
            --name "${AZURE_ACR_NAME}" \
            --repository worker \
            --query "[?@=='${IMAGE_TAG}']" \
            --output tsv | grep -x "${IMAGE_TAG}"

      - name: Summarize worker build
        run: |
          {
            echo "### Worker image"
            echo "- pushed \`${WORKER_IMAGE}\`"
          } >> "${GITHUB_STEP_SUMMARY}"
