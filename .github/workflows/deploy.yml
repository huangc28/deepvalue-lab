name: Deploy

on:
  push:
    branches:
      - master

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write

jobs:
  foundation:
    name: Phase 1 Foundation
    runs-on: ubuntu-latest
    env:
      AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
      AZURE_CONTAINERAPPS_ENV: ${{ vars.AZURE_CONTAINERAPPS_ENV }}
      AZURE_LOCATION: ${{ vars.AZURE_LOCATION }}
      AZURE_ACR_NAME: ${{ vars.AZURE_ACR_NAME }}
      VITE_API_URL: ${{ vars.VITE_API_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required GitHub configuration
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        run: |
          set -eu

          missing=0
          for key in \
            AZURE_CLIENT_ID \
            AZURE_TENANT_ID \
            AZURE_SUBSCRIPTION_ID \
            AZURE_RESOURCE_GROUP \
            AZURE_CONTAINERAPPS_ENV \
            AZURE_LOCATION \
            AZURE_ACR_NAME \
            VITE_API_URL
          do
            if [ -z "${!key:-}" ]; then
              echo "::error title=Missing config::$key is not configured"
              missing=1
            fi
          done

          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Azure login via OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Install Azure Container Apps extension
        run: |
          az extension add --name containerapp --upgrade

      - name: Resolve target Azure resources
        run: |
          set -eu

          echo "Resolving Azure foundation resources..."
          echo "Resource group: ${AZURE_RESOURCE_GROUP}"
          echo "Container Apps environment: ${AZURE_CONTAINERAPPS_ENV}"
          echo "Azure location: ${AZURE_LOCATION}"
          echo "ACR name: ${AZURE_ACR_NAME}"
          echo "VITE_API_URL: ${VITE_API_URL}"

          az account show --output table

          actual_rg_location="$(
            az group show \
              --name "${AZURE_RESOURCE_GROUP}" \
              --query location \
              --output tsv
          )"

          if [ "${actual_rg_location}" != "${AZURE_LOCATION}" ]; then
            echo "::error title=Azure location mismatch::AZURE_LOCATION=${AZURE_LOCATION} but resource group is in ${actual_rg_location}"
            exit 1
          fi

          az group show --name "${AZURE_RESOURCE_GROUP}" --output table
          az containerapp env show \
            --name "${AZURE_CONTAINERAPPS_ENV}" \
            --resource-group "${AZURE_RESOURCE_GROUP}" \
            --output table
          az acr show --name "${AZURE_ACR_NAME}" --output table
