type: Microsoft.App/containerApps
apiVersion: 2024-03-01
name: be
location: <location>
properties:
  managedEnvironmentId: /subscriptions/<subscription-id>/resourceGroups/<resource-group>/providers/Microsoft.App/managedEnvironments/<environment-name>
  configuration:
    ingress:
      external: true
      targetPort: 8080
    secrets: []
  template:
    containers:
      - name: be
        image: <registry>/<image>:<tag>
        env:
          - name: APP_NAME
            value: be
          - name: APP_ENV
            value: production
          - name: APP_PORT
            value: "8080"
          - name: LOG_LEVEL
            value: info
    scale:
      minReplicas: 0
      maxReplicas: 2
